name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin so a bun release can't break CI out from under an unchanged commit.
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run typecheck

      - name: Build (JS + d.ts)
        run: bun run build

      - name: Unit tests
        run: bun run test

      - name: E2E tests
        run: bun run test:e2e

      - name: Performance guards
        run: bun run perf

      - name: Circular-dependency check
        run: bunx madge --circular --extensions ts,tsx src

      - name: Layer-leak guard (no driver/ANSI in widgets/core)
        run: bun run review
