name: Publish to npm

# Publishes @huyz0/ztui when you cut a GitHub Release (e.g. tag v1.0.0).
# Requires an `NPM_TOKEN` repository secret (an npm automation token).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # setup-node writes the auth-enabled .npmrc and pins the registry so
      # `npm publish` (and provenance) work.
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gates
        run: |
          bun run lint
          bun run typecheck
          bun run test

      - name: Verify release tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # prepublishOnly runs `bun run build`; --provenance publishes a signed
      # provenance attestation (public repo + id-token: write).
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
