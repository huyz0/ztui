name: Publish to npm

# Publishes @huyz0/ztui when you cut a GitHub Release (e.g. tag v1.0.0).
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. You must first
# configure this repo + workflow as a Trusted Publisher on npm:
#   npmjs.com → the package → Settings → Trusted Publishing → GitHub Actions
#   (repo: huyz0/ztui, workflow: publish.yml).
# npm verifies the OIDC identity of this workflow and accepts the publish.
# Provenance is attached automatically.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires a recent npm (>= 11.5.1); node 22 ships
      # npm 10, so upgrade the CLI before publishing.
      - name: Upgrade npm (Trusted Publishing support)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gates
        run: |
          bun run lint
          bun run typecheck
          bun run test

      - name: Verify release tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: npm exchanges the workflow's OIDC token for a
      # short-lived publish credential. prepublishOnly runs `bun run build`.
      - name: Publish
        run: npm publish --access public
